<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Oyuncu Ekrani</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="container player player-layout">
    <nav class="top-shortcut" aria-label="Ust navigasyon">
      <a class="brand-pill" href="/">Parti Oyunlari</a>
      <a class="home-link" href="/">Ana Menuye Don</a>
    </nav>

    <section class="panel hero">
      <p class="eyebrow">Oyuncu Oturumu</p>
      <h1>Oyuncu Ekrani</h1>
      <p>Oda Kodu: <strong id="roomCodeText">-</strong></p>
      <p id="statusText" class="status-line" aria-live="polite">Oyuna katilmak icin adini yaz.</p>
      <p id="nightCountdownRow" class="countdown hidden">Gece bitimine: <strong id="nightCountdownText">00:00</strong></p>
      <p id="winnerText" class="winner hidden"></p>
    </section>

    <section class="panel interaction-panel">
      <div id="joinForm" class="stack">
        <label for="nameInput">Adin</label>
        <input id="nameInput" type="text" maxlength="24" placeholder="Ornek: Ayse" />
        <button id="joinBtn">Katil</button>
      </div>

      <div id="roleCard" class="role role-card hidden">
        <h2 id="roleTitle"></h2>
        <p id="roleInfo"></p>
        <p id="clueWrapper" class="hidden">Kelime/Unlu: <strong id="clue"></strong></p>
      </div>

      <div id="actionPanel" class="panel action-card action-panel hidden">
        <label for="targetSelect" id="targetLabel">Hedef Oyuncu</label>
        <select id="targetSelect"></select>
        <button id="sendActionBtn">Secimi Gonder</button>
      </div>

      <div id="vampireIntelPanel" class="panel action-card intel-panel hidden">
        <h2>Vampir Koordinasyonu</h2>
        <p id="vampireTeamText" class="muted"></p>
        <ul id="vampireVoteList" class="player-list compact"></ul>
        <p id="vampireConsensusText" class="muted"></p>
      </div>

      <div id="nightChatPanel" class="panel action-card chat-panel hidden">
        <h2>Gece Sohbeti</h2>
        <p id="chatInfoText" class="muted"></p>

        <div class="stack chat-channel">
          <h3>Genel Sohbet</h3>
          <div id="generalChatList" class="chat-list"></div>
          <div class="actions">
            <input id="generalChatInput" type="text" maxlength="220" placeholder="Genel sohbete yaz..." />
            <button id="sendGeneralChatBtn" class="secondary">Gonder</button>
          </div>
        </div>

        <div id="vampireChatSection" class="stack chat-channel hidden">
          <h3>Vampir Ozel Sohbet</h3>
          <div id="vampireChatList" class="chat-list"></div>
          <div class="actions">
            <input id="vampireChatInput" type="text" maxlength="220" placeholder="Vampir ozel sohbete yaz..." />
            <button id="sendVampireChatBtn" class="danger">Vampir Sohbetine Gonder</button>
          </div>
        </div>
      </div>

      <p id="summaryText" class="muted hidden"></p>
      <p id="playerMessage" class="message" aria-live="polite"></p>
    </section>
  </main>

  <div id="popupOverlay" class="popup-overlay hidden">
    <div class="popup-card">
      <h2 id="popupTitle">Bilgi</h2>
      <p id="popupText"></p>
      <button id="popupCloseBtn">Tamam</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const roomCode = (window.location.pathname.split("/")[2] || "").toUpperCase();

    const roomCodeText = document.getElementById("roomCodeText");
    const statusText = document.getElementById("statusText");
    const nightCountdownRow = document.getElementById("nightCountdownRow");
    const nightCountdownText = document.getElementById("nightCountdownText");
    const winnerText = document.getElementById("winnerText");
    const joinForm = document.getElementById("joinForm");
    const nameInput = document.getElementById("nameInput");
    const joinBtn = document.getElementById("joinBtn");
    const roleCard = document.getElementById("roleCard");
    const roleTitle = document.getElementById("roleTitle");
    const roleInfo = document.getElementById("roleInfo");
    const clueWrapper = document.getElementById("clueWrapper");
    const clueEl = document.getElementById("clue");
    const actionPanel = document.getElementById("actionPanel");
    const targetLabel = document.getElementById("targetLabel");
    const targetSelect = document.getElementById("targetSelect");
    const sendActionBtn = document.getElementById("sendActionBtn");
    const vampireIntelPanel = document.getElementById("vampireIntelPanel");
    const vampireTeamText = document.getElementById("vampireTeamText");
    const vampireVoteList = document.getElementById("vampireVoteList");
    const vampireConsensusText = document.getElementById("vampireConsensusText");
    const nightChatPanel = document.getElementById("nightChatPanel");
    const chatInfoText = document.getElementById("chatInfoText");
    const generalChatList = document.getElementById("generalChatList");
    const generalChatInput = document.getElementById("generalChatInput");
    const sendGeneralChatBtn = document.getElementById("sendGeneralChatBtn");
    const vampireChatSection = document.getElementById("vampireChatSection");
    const vampireChatList = document.getElementById("vampireChatList");
    const vampireChatInput = document.getElementById("vampireChatInput");
    const sendVampireChatBtn = document.getElementById("sendVampireChatBtn");
    const summaryText = document.getElementById("summaryText");
    const playerMessage = document.getElementById("playerMessage");
    const popupOverlay = document.getElementById("popupOverlay");
    const popupTitle = document.getElementById("popupTitle");
    const popupText = document.getElementById("popupText");
    const popupCloseBtn = document.getElementById("popupCloseBtn");

    let joined = false;
    let myRole = "waiting";
    let myAlive = true;
    let currentGame = "impostor";
    let currentPhase = "waiting";
    let nightEndsAt = null;
    let countdownTimer = null;
    let players = [];
    let gozcuUsesLeft = 0;
    let vampireTeam = [];
    let vampireVoteState = [];
    let vampireConsensus = false;
    let nightChatState = {
      isNight: false,
      canGeneral: false,
      canVampire: false,
      general: [],
      vampire: []
    };

    roomCodeText.textContent = roomCode || "-";

    function setMessage(text, isError = false) {
      playerMessage.textContent = text;
      playerMessage.className = isError ? "message error" : "message";
    }

    function openPopup(title, text) {
      popupTitle.textContent = title;
      popupText.textContent = text;
      popupOverlay.classList.remove("hidden");
    }

    function closePopup() {
      popupOverlay.classList.add("hidden");
    }

    function formatCountdown(ms) {
      const totalSec = Math.max(0, Math.ceil(ms / 1000));
      const min = String(Math.floor(totalSec / 60)).padStart(2, "0");
      const sec = String(totalSec % 60).padStart(2, "0");
      return `${min}:${sec}`;
    }

    function stopCountdown() {
      if (countdownTimer) {
        clearInterval(countdownTimer);
        countdownTimer = null;
      }
    }

    function renderNightCountdown() {
      if (currentGame !== "vampire" || currentPhase !== "night" || !nightEndsAt) {
        nightCountdownRow.classList.add("hidden");
        stopCountdown();
        return;
      }

      nightCountdownRow.classList.remove("hidden");
      const tick = () => {
        const left = nightEndsAt - Date.now();
        nightCountdownText.textContent = formatCountdown(left);
        if (left <= 0) {
          stopCountdown();
          statusText.textContent = "Gece bitti, sonuc bekleniyor...";
        }
      };
      stopCountdown();
      tick();
      countdownTimer = setInterval(tick, 500);
    }

    function renderWinner(winner) {
      if (!winner) {
        winnerText.classList.add("hidden");
        return;
      }
      winnerText.classList.remove("hidden");
      winnerText.textContent = winner === "vampir" ? "Oyun bitti: Vampirler kazandi" : "Oyun bitti: Koyluler kazandi";
    }

    function renderSummary(summary) {
      if (!summary || currentGame !== "vampire") {
        summaryText.classList.add("hidden");
        return;
      }
      summaryText.classList.remove("hidden");
      summaryText.textContent = `Hayatta kalanlar - Toplam: ${summary.aliveTotal}, Vampir: ${summary.aliveVampires}, Koylu tarafi: ${summary.aliveVillagers}`;
    }

    function formatChatTime(ts) {
      if (!ts) {
        return "--:--";
      }
      const date = new Date(ts);
      const hour = String(date.getHours()).padStart(2, "0");
      const min = String(date.getMinutes()).padStart(2, "0");
      return `${hour}:${min}`;
    }

    function renderChatList(container, messages) {
      container.innerHTML = "";
      for (const msg of messages) {
        const row = document.createElement("p");
        row.className = "chat-line";
        const sender = msg.senderName || "Oyuncu";
        row.textContent = `[${formatChatTime(msg.sentAt)}] ${sender}: ${msg.text}`;
        container.appendChild(row);
      }
      if (!messages || messages.length === 0) {
        const row = document.createElement("p");
        row.className = "chat-line muted";
        row.textContent = "Henuz mesaj yok.";
        container.appendChild(row);
      }
      container.scrollTop = container.scrollHeight;
    }

    function resetNightChatState() {
      nightChatState = {
        isNight: false,
        canGeneral: false,
        canVampire: false,
        general: [],
        vampire: []
      };
    }

    function renderNightChatPanels() {
      const canShowNightChat = joined && currentGame === "vampire" && currentPhase === "night";
      nightChatPanel.classList.toggle("hidden", !canShowNightChat);
      if (!canShowNightChat) {
        return;
      }

      const canGeneral = Boolean(nightChatState.canGeneral);
      const canVampire = Boolean(nightChatState.canVampire);
      chatInfoText.textContent = canGeneral
        ? "Gece sohbeti acik. Vampirler genel sohbete de yazabilir."
        : "Gece sohbeti bu oyuncu icin kapali.";

      generalChatInput.disabled = !canGeneral;
      sendGeneralChatBtn.disabled = !canGeneral;
      renderChatList(generalChatList, nightChatState.general || []);

      vampireChatSection.classList.toggle("hidden", !canVampire);
      vampireChatInput.disabled = !canVampire;
      sendVampireChatBtn.disabled = !canVampire;
      if (canVampire) {
        renderChatList(vampireChatList, nightChatState.vampire || []);
      }
    }

    function resetVampireIntelData() {
      vampireTeam = [];
      vampireVoteState = [];
      vampireConsensus = false;
      resetNightChatState();
    }

    function renderVampireIntel() {
      if (currentGame !== "vampire" || myRole !== "vampir") {
        vampireIntelPanel.classList.add("hidden");
        return;
      }

      vampireIntelPanel.classList.remove("hidden");
      const teammateNames = vampireTeam
        .filter((member) => member.id !== socket.id)
        .map((member) => member.name);
      vampireTeamText.textContent = teammateNames.length > 0
        ? `Diger vampir(ler): ${teammateNames.join(", ")}`
        : "Bu turda tek vampirsin.";

      vampireVoteList.innerHTML = "";
      for (const vote of vampireVoteState) {
        const li = document.createElement("li");
        const targetText = vote.targetPlayerName ? vote.targetPlayerName : "secim yapmadi";
        li.textContent = `${vote.vampireName} -> ${targetText}`;
        vampireVoteList.appendChild(li);
      }
      if (vampireVoteState.length === 0) {
        const li = document.createElement("li");
        li.textContent = "Henuz secim yapilmadi.";
        vampireVoteList.appendChild(li);
      }

      if (currentPhase !== "night") {
        vampireConsensusText.textContent = "Koordinasyon bilgisi gece fazinda guncellenir.";
      } else if (vampireConsensus) {
        vampireConsensusText.textContent = "Mutabakat var: ayni hedef secildi.";
      } else {
        vampireConsensusText.textContent = "Mutabakat yoksa gece sonunda kimse elenmez.";
      }
    }

    function showActionPanel() {
      if (currentGame !== "vampire" || currentPhase !== "night" || !myAlive) {
        actionPanel.classList.add("hidden");
        renderNightCountdown();
        renderVampireIntel();
        renderNightChatPanels();
        return;
      }

      if (myRole !== "vampir" && myRole !== "doktor" && myRole !== "gozcu") {
        actionPanel.classList.add("hidden");
        renderNightCountdown();
        renderVampireIntel();
        renderNightChatPanels();
        return;
      }

      if (myRole === "gozcu" && gozcuUsesLeft <= 0) {
        actionPanel.classList.add("hidden");
        renderNightCountdown();
        renderVampireIntel();
        renderNightChatPanels();
        return;
      }

      targetSelect.innerHTML = "";
      const targetCandidates = players.filter((p) => {
        if (!p.alive) {
          return false;
        }
        if (myRole === "vampir" || myRole === "gozcu") {
          return p.id !== socket.id;
        }
        return true;
      });
      for (const player of targetCandidates) {
        const option = document.createElement("option");
        option.value = player.id;
        option.textContent = player.name;
        targetSelect.appendChild(option);
      }

      if (myRole === "vampir") {
        targetLabel.textContent = "Oldurmek istedigin oyuncu";
      } else if (myRole === "doktor") {
        targetLabel.textContent = "Korumak istedigin oyuncu";
      } else {
        targetLabel.textContent = `Rolunu gormek istedigin oyuncu (Kalan hak: ${gozcuUsesLeft})`;
      }
      actionPanel.classList.toggle("hidden", targetCandidates.length === 0);
      renderNightCountdown();
      renderVampireIntel();
      renderNightChatPanels();
    }

    function renderImpostor(payload) {
      roleCard.classList.remove("hidden");
      currentGame = "impostor";
      myRole = payload.role;
      myAlive = true;
      currentPhase = "active";
      nightEndsAt = null;
      resetVampireIntelData();
      renderWinner(null);
      renderSummary(null);

      if (payload.role === "waiting") {
        statusText.textContent = "Tur henuz baslamadi. Bekleniyor...";
        roleTitle.textContent = "Beklemede";
        roleInfo.textContent = "";
        clueWrapper.classList.add("hidden");
        renderNightCountdown();
        renderNightChatPanels();
        return;
      }

      statusText.textContent = "Rolun dagitildi.";
      if (payload.role === "impostor") {
        roleTitle.textContent = "Sen impostorsun";
        roleInfo.textContent = `Kategori: ${payload.category || "-"}`;
        clueWrapper.classList.add("hidden");
      } else {
        roleTitle.textContent = "Normal Oyuncu";
        roleInfo.textContent = `Kategori: ${payload.category || "-"}`;
        clueEl.textContent = payload.clue || "-";
        clueWrapper.classList.remove("hidden");
      }
      actionPanel.classList.add("hidden");
      renderVampireIntel();
      renderNightCountdown();
      renderNightChatPanels();
    }

    function renderVampire(payload) {
      roleCard.classList.remove("hidden");
      currentGame = "vampire";
      myRole = payload.role;
      myAlive = payload.alive !== false;
      gozcuUsesLeft = Number(payload.gozcuUsesLeft || 0);
      currentPhase = payload.phase || currentPhase;
      nightEndsAt = payload.nightEndsAt || null;
      players = Array.isArray(payload.players) ? payload.players : players;
      vampireTeam = Array.isArray(payload.vampireTeam) ? payload.vampireTeam : vampireTeam;
      vampireVoteState = Array.isArray(payload.vampireVoteState) ? payload.vampireVoteState : vampireVoteState;
      vampireConsensus = Boolean(payload.consensusAchieved);
      renderWinner(payload.winner || null);
      renderSummary(payload.summary || null);
      renderNightChatPanels();

      if (payload.role === "waiting") {
        roleTitle.textContent = "Beklemede";
        roleInfo.textContent = "Host oyunu baslatinca rol dagitilacak.";
        statusText.textContent = "Rol bekleniyor...";
        clueWrapper.classList.add("hidden");
        showActionPanel();
        return;
      }

      statusText.textContent = myAlive ? "Rolun dagitildi." : "Bu turda elendin.";
      roleTitle.textContent = `Rol: ${payload.role}`;
      roleInfo.textContent = myRole === "gozcu"
        ? `Faz: ${payload.phase || "-"} | Kalan Hak: ${gozcuUsesLeft}`
        : `Faz: ${payload.phase || "-"}`;
      clueWrapper.classList.add("hidden");
      showActionPanel();
    }

    joinBtn.addEventListener("click", () => {
      const name = nameInput.value.trim();
      if (!roomCode) {
        setMessage("Gecersiz oda.", true);
        return;
      }
      if (!name) {
        setMessage("Isim zorunlu.", true);
        return;
      }
      socket.emit("player:join", { roomCode, name });
    });

    sendActionBtn.addEventListener("click", () => {
      const targetPlayerId = targetSelect.value;
      if (!targetPlayerId) {
        return;
      }

      if (myRole === "vampir") {
        socket.emit("vampire:vote_kill", { roomCode, targetPlayerId });
        return;
      }
      if (myRole === "doktor") {
        socket.emit("doctor:protect", { roomCode, targetPlayerId });
        return;
      }
      if (myRole === "gozcu") {
        socket.emit("gozcu:inspect", { roomCode, targetPlayerId });
      }
    });

    function sendGeneralChat() {
      const text = generalChatInput.value.trim();
      if (!text) {
        return;
      }
      socket.emit("chat:send_general", { roomCode, message: text });
      generalChatInput.value = "";
    }

    function sendVampireChat() {
      const text = vampireChatInput.value.trim();
      if (!text) {
        return;
      }
      socket.emit("chat:send_vampire", { roomCode, message: text });
      vampireChatInput.value = "";
    }

    sendGeneralChatBtn.addEventListener("click", sendGeneralChat);
    sendVampireChatBtn.addEventListener("click", sendVampireChat);
    generalChatInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        sendGeneralChat();
      }
    });
    vampireChatInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        sendVampireChat();
      }
    });

    socket.on("player:joined", (payload) => {
      joined = true;
      currentGame = payload.gameType;
      joinForm.classList.add("hidden");
      statusText.textContent = `Odaya katildin: ${payload.playerName}. Tur bekleniyor...`;
      setMessage("");
      renderNightChatPanels();
    });

    socket.on("room:update", (payload) => {
      if (payload.roomCode !== roomCode) {
        return;
      }
      currentPhase = payload.phase || currentPhase;
      nightEndsAt = payload.nightEndsAt || null;
      players = Array.isArray(payload.players) ? payload.players : players;
      renderWinner(payload.winner || null);
      renderSummary(payload.summary || null);
      showActionPanel();
      renderNightChatPanels();
    });

    socket.on("vampire:vote_state", (payload) => {
      if (currentGame !== "vampire" || myRole !== "vampir" || !payload) {
        return;
      }
      currentPhase = payload.phase || currentPhase;
      vampireTeam = Array.isArray(payload.vampireTeam) ? payload.vampireTeam : vampireTeam;
      vampireVoteState = Array.isArray(payload.vampireVoteState) ? payload.vampireVoteState : vampireVoteState;
      vampireConsensus = Boolean(payload.consensusAchieved);
      renderVampireIntel();
      showActionPanel();
      renderNightChatPanels();
    });

    socket.on("chat:state", (payload) => {
      if (!payload || payload.roomCode !== roomCode) {
        return;
      }
      nightChatState = {
        isNight: Boolean(payload.isNight),
        canGeneral: Boolean(payload.canGeneral),
        canVampire: Boolean(payload.canVampire),
        general: Array.isArray(payload.general) ? payload.general : [],
        vampire: Array.isArray(payload.vampire) ? payload.vampire : []
      };
      renderNightChatPanels();
    });

    socket.on("chat:message", (payload) => {
      if (!payload || !payload.entry || !payload.channel) {
        return;
      }
      if (payload.channel === "general") {
        nightChatState.general = [...(nightChatState.general || []), payload.entry].slice(-80);
      } else if (payload.channel === "vampire") {
        nightChatState.vampire = [...(nightChatState.vampire || []), payload.entry].slice(-80);
      } else {
        return;
      }
      renderNightChatPanels();
    });

    socket.on("round:assigned", (payload) => {
      if (!joined || !payload) {
        return;
      }
      if (payload.game === "vampire") {
        renderVampire(payload);
        return;
      }
      renderImpostor(payload);
    });

    socket.on("vampire:night_result", (payload) => {
      const reasonText = payload.reason === "timeout" ? "Sure bitti. " : "";
      const consensusText = payload.consensusAchieved === false
        ? "Vampirler ayni hedefte anlasamadi. "
        : "";
      const message = payload.killedPlayerName
        ? `Gece sonucu: ${reasonText}${payload.killedPlayerName} elendi.`
        : `Gece sonucu: ${reasonText}${consensusText}Kimse elenmedi.`;
      setMessage(message);
      openPopup("Gece Sonucu", message);
      renderNightCountdown();
      renderNightChatPanels();
    });

    socket.on("vampire:day_result", (payload) => {
      setMessage(`Gunduz sonucu: ${payload.eliminatedPlayerName} elendi.`);
    });

    socket.on("vampire:game_over", (payload) => {
      renderWinner(payload.winner || null);
      const text = payload.winner === "vampir" ? "Vampirler kazandi." : "Koyluler kazandi.";
      setMessage(`Oyun bitti. ${text}`);
      openPopup("Oyun Bitti", `Kazanan taraf: ${payload.winner === "vampir" ? "Vampirler" : "Koyluler"}`);
      renderNightChatPanels();
    });

    socket.on("vampire:inspect_result", (payload) => {
      const roleMap = {
        vampir: "Vampir",
        doktor: "Doktor",
        koylu: "Koylu",
        gozcu: "Gozcu"
      };
      const roleText = roleMap[payload.targetRole] || payload.targetRole;
      const text = `${payload.targetName} oyuncusunun rolu: ${roleText}`;
      setMessage(text);
      openPopup("Gozcu Bilgisi", text);
    });

    socket.on("action:ok", (payload) => {
      setMessage(payload.message || "Islem kaydedildi.");
    });

    socket.on("round:error", (payload) => {
      setMessage(payload.message || "Bilinmeyen hata", true);
    });

    socket.on("connect_error", () => {
      setMessage("Sunucuya baglanilamadi.", true);
    });

    popupCloseBtn.addEventListener("click", closePopup);
    popupOverlay.addEventListener("click", (event) => {
      if (event.target === popupOverlay) {
        closePopup();
      }
    });
  </script>
</body>
</html>
